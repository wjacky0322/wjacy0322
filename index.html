<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火星作物病害影像通報統計系統 (POC)</title>
    <!-- Tailwind CSS CDN (內建響應式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse CDN for CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }
        /* 簡單的淡入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">

    <!-- Header Banner -->
    <header class="bg-slate-900 text-white shadow-md px-6 py-4 flex flex-col md:flex-row justify-between items-center border-b border-red-500 border-t-4 transition-all duration-300">
        <div class="mb-4 md:mb-0 w-full md:w-auto flex flex-col md:flex-row items-center md:items-start text-center md:text-left">
            <div class="flex items-center space-x-2 justify-center md:justify-start">
                <span class="bg-red-600 text-xs text-white px-2 py-0.5 rounded font-bold uppercase tracking-wider animate-pulse" data-i18n="badge">MARS MISSION</span>
                <h1 class="text-xl md:text-2xl font-bold tracking-tight" data-i18n="title">作物病害影像通報統計系統</h1>
            </div>
            <p class="text-xs text-slate-400 mt-1 md:ml-2" data-i18n="subtitle">案號：MARS-007 | 招標單位：火星移民計畫指揮部</p>
        </div>
        
        <div class="flex flex-col sm:flex-row items-center space-y-3 sm:space-y-0 sm:space-x-4 w-full md:w-auto">
            <!-- 語系切換器 -->
            <div class="relative">
                <select id="langSwitcher" class="bg-slate-800 border border-slate-600 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block w-full p-2 cursor-pointer transition-colors hover:bg-slate-700">
                    <option value="zh-TW">繁體中文 (TW)</option>
                    <option value="zh-CN">简体中文 (CN)</option>
                    <option value="en">English (EN)</option>
                    <option value="ja">日本語 (JA)</option>
                </select>
            </div>

            <!-- 動態載入模組 -->
            <div class="flex items-center bg-slate-800 p-2 rounded-lg border border-slate-700 w-full sm:w-auto justify-center">
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" />
                <label for="csvFileInput" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold py-2 px-4 rounded cursor-pointer transition-all shadow duration-200 flex items-center space-x-1 w-full justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    <span data-i18n="uploadBtn">載入 CSV 資料</span>
                </label>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-6 max-w-[1600px] w-full mx-auto space-y-6">

        <!-- 初始歡迎畫面 -->
        <div id="welcomeScreen" class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center max-w-2xl mx-auto my-12 fade-in">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2" data-i18n="welcomeTitle">等待載入火星通報數據</h2>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed" data-i18n="welcomeDesc">
                本系統已完美整合「自動化髒資料清理引擎」與「AI 病症智慧歸類模型」。<br>
                請點擊右上方按鈕選取最新的 MARS-007.csv，系統將即時渲染統計圖表。
            </p>
        </div>

        <!-- 儀表板內容 -->
        <div id="dashboardContent" class="hidden space-y-6 fade-in">
            
            <!-- KPI 統計卡片 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4 hover:shadow-md transition-shadow">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase" data-i18n="kpiTotal">有效通報總筆數</p>
                        <h3 id="statTotal" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4 hover:shadow-md transition-shadow">
                    <div class="p-3 bg-amber-50 text-amber-600 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase" data-i18n="kpiCleaned">攔截髒資料</p>
                        <h3 id="statCleaned" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4 hover:shadow-md transition-shadow">
                    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase" data-i18n="kpiAiRate">AI 智慧歸類率</p>

                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4 hover:shadow-md transition-shadow">
                    <div class="p-3 bg-rose-50 text-rose-600 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase" data-i18n="kpiPending">待處理案件</p>
                        <h3 id="statPending" class="text-2xl font-bold text-rose-600 mt-0.5">0</h3>
                    </div>
                </div>
            </div>

            <!-- 圖表區 -->
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                <!-- 長條圖 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 xl:col-span-2 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-base font-bold text-slate-900 flex items-center">
                            <span class="w-2.5 h-2.5 bg-blue-600 rounded-full mr-2"></span>
                            <span data-i18n="chartBarTitle">各艙段作物病害分布統計</span>
                        </h3>
                    </div>
                    <div class="relative flex-1 min-h-[350px]">
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>

                <!-- 圓餅圖 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-base font-bold text-slate-900 flex items-center">
                            <span class="w-2.5 h-2.5 bg-purple-600 rounded-full mr-2"></span>
                            <span data-i18n="chartPieTitle">AI 歸類佔比分析</span>
                        </h3>
                    </div>
                    <div class="relative flex-1 min-h-[250px] flex items-center justify-center">
                        <canvas id="diseasePieChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 數據明細表 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden fade-in">
                <div class="p-5 border-b border-slate-100 bg-slate-50 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-3 sm:space-y-0">
                    <div>
                        <h3 class="text-base font-bold text-slate-900" data-i18n="tableTitle">通報明細清單</h3>
                        <p class="text-xs text-slate-500 mt-0.5" data-i18n="tableDesc">自動清理與狀態歸一化管理</p>
                    </div>
                    <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 w-full sm:w-auto">
                        <select id="statusFilter" class="bg-white border border-slate-300 text-xs font-medium rounded-lg px-3 py-2 w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <!-- Options populated by JS -->
                        </select>
                        <select id="cabinFilter" class="bg-white border border-slate-300 text-xs font-medium rounded-lg px-3 py-2 w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto max-h-[450px]">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 uppercase text-[11px] font-bold tracking-wider sticky top-0 border-b border-slate-200 z-10">
                                <th class="px-6 py-3" data-i18n="thId">序號</th>
                                <th class="px-6 py-3" data-i18n="thDate">日期</th>
                                <th class="px-6 py-3" data-i18n="thCabin">艙段</th>
                                <th class="px-6 py-3" data-i18n="thCrop">作物</th>
                                <th class="px-6 py-3" data-i18n="thDesc">原始描述</th>
                                <th class="px-6 py-3" data-i18n="thAi">AI 歸類</th>
                                <th class="px-6 py-3" data-i18n="thStatus">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-200 text-sm text-slate-700">
                            <!-- Rows injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- 語言包與邏輯 (Language Dictionary & Logic) -->
    <script>
        // --- 1. 多國語系字典 (i18n Dictionary) ---
        const i18n = {
            'zh-TW': {
                badge: 'MARS MISSION', title: '作物病害影像通報統計系統', subtitle: '案號：MARS-007 | 招標單位：火星移民計畫指揮部',
                uploadBtn: '選擇最新的 CSV 資料', welcomeTitle: '等待載入火星通報數據', welcomeDesc: '本系統已整合「資料清理引擎」與「AI 歸類模型」。請點擊右上方載入 MARS-007.csv。',
                kpiTotal: '有效通報總筆數', kpiCleaned: '攔截重複/髒資料', kpiAiRate: 'AI 智慧歸類率', kpiPending: '待處理案件數',
                chartBarTitle: '各艙段作物病害分布統計', chartPieTitle: 'AI 歸類佔比分析',
                tableTitle: '通報明細清單', tableDesc: '自動對齊日期格式與狀態歸一化',
                thId: '序號', thDate: '日期', thCabin: '艙段', thCrop: '作物', thDesc: '原始病症描述', thAi: 'AI 歸類', thStatus: '狀態',
                filterStatusAll: '所有狀態', filterCabinAll: '所有艙段',
                statusPending: '待處理', statusDone: '已完成',
                diseaseNames: { '白粉病': '白粉病', '黃斑病': '黃斑病', '根腐病': '根腐病', '枯萎病': '枯萎病', '生長遲緩': '生長遲緩', '健康/無異常': '健康/無異常' }
            },
            'zh-CN': {
                badge: 'MARS MISSION', title: '作物病害影像通报统计系统', subtitle: '案号：MARS-007 | 招标单位：火星移民计划指挥部',
                uploadBtn: '选择最新的 CSV 数据', welcomeTitle: '等待加载火星通报数据', welcomeDesc: '本系统已整合「数据清理引擎」与「AI 归类模型」。请点击右上方加载 MARS-007.csv。',
                kpiTotal: '有效通报总数', kpiCleaned: '拦截重复/脏数据', kpiAiRate: 'AI 智能归类率', kpiPending: '待处理案件数',
                chartBarTitle: '各舱段作物病害分布统计', chartPieTitle: 'AI 归类占比分析',
                tableTitle: '通报明细清单', tableDesc: '自动对齐日期格式与状态归一化',
                thId: '序号', thDate: '日期', thCabin: '舱段', thCrop: '作物', thDesc: '原始病症描述', thAi: 'AI 归类', thStatus: '状态',
                filterStatusAll: '所有状态', filterCabinAll: '所有舱段',
                statusPending: '待处理', statusDone: '已完成',
                diseaseNames: { '白粉病': '白粉病', '黃斑病': '黄斑病', '根腐病': '根腐病', '枯萎病': '枯萎病', '生長遲緩': '生长迟缓', '健康/無異常': '健康/无异常' }
            },
            'en': {
                badge: 'MARS MISSION', title: 'Crop Disease Reporting System', subtitle: 'Project: MARS-007 | Client: Mars Colonization Command',
                uploadBtn: 'Load CSV Data', welcomeTitle: 'Waiting for Mars Data', welcomeDesc: 'System integrated with Auto-Cleaning & AI Classification. Please load MARS-007.csv from the top right.',
                kpiTotal: 'Valid Reports', kpiCleaned: 'Filtered Bad Data', kpiAiRate: 'AI Tagging Rate', kpiPending: 'Pending Cases',
                chartBarTitle: 'Disease Distribution by Cabin', chartPieTitle: 'AI Classification Ratio',
                tableTitle: 'Report Details List', tableDesc: 'Auto-formatted dates and normalized status',
                thId: 'ID', thDate: 'Date', thCabin: 'Cabin', thCrop: 'Crop', thDesc: 'Raw Description', thAi: 'AI Class', thStatus: 'Status',
                filterStatusAll: 'All Statuses', filterCabinAll: 'All Cabins',
                statusPending: 'Pending', statusDone: 'Done',
                diseaseNames: { '白粉病': 'Powdery Mildew', '黃斑病': 'Yellow Spot', '根腐病': 'Root Rot', '枯萎病': 'Wilt', '生長遲緩': 'Stunted Growth', '健康/無異常': 'Healthy' }
            },
            'ja': {
                badge: '火星任務', title: '作物病害画像通報統計システム', subtitle: '案件番号: MARS-007 | 発注者: 火星移住計画指揮部',
                uploadBtn: 'CSVデータを読込', welcomeTitle: '火星データのロード待ち', welcomeDesc: 'データクレンジングとAI分類モデルを統合済み。右上のボタンからMARS-007.csvを読み込んでください。',
                kpiTotal: '有効な通報数', kpiCleaned: '重複/不正データ排除', kpiAiRate: 'AI自動分類率', kpiPending: '未処理の案件',
                chartBarTitle: 'キャビン別病害分布統計', chartPieTitle: 'AI分類割合分析',
                tableTitle: '通報詳細リスト', tableDesc: '日付フォーマットの自動調整とステータスの正規化',
                thId: 'No.', thDate: '日付', thCabin: 'キャビン', thCrop: '作物', thDesc: '元の説明', thAi: 'AI分類', thStatus: '状態',
                filterStatusAll: '全ての状態', filterCabinAll: '全てのキャビン',
                statusPending: '未処理', statusDone: '完了',
                diseaseNames: { '白粉病': 'うどんこ病', '黃斑病': '黄斑病', '根腐病': '根腐れ', '枯萎病': '立ち枯れ病', '生長遲緩': '生育遅延', '健康/無異常': '異常なし' }
            }
        };

        let currentLang = 'zh-TW';
        let rawDataGlobal = [];
        let cleanedDataGlobal = [];
        let chartsInstance = { distribution: null, pie: null };

        // --- 2. 語系切換邏輯 ---
        function updateLanguage(lang) {
            currentLang = lang;
            const t = i18n[lang];
            
            // 更新靜態文字 (使用 data-i18n 屬性)
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            // 如果資料已經載入，重新渲染畫面(表單、圖表、過濾器)以套用新語言
            if (cleanedDataGlobal.length > 0) {
                populateFilterOptions(cleanedDataGlobal);
                renderDashboardElements();
            }
        }

        document.getElementById('langSwitcher').addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });

        // --- 以下為原有邏輯 (加上語系支援與 RWD 樣式微調) ---
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: function(results) { processAndRenderData(results.data); },
                error: function(err) { alert('CSV Parsing Error: ' + err.message); }
            });
        });

        function processAndRenderData(data) {
            let seenRows = new Set();
            let duplicateCount = 0;
            let finalCleanedData = [];
            let pendingCount = 0;

            data.forEach((row) => {
                let rowString = JSON.stringify(row);
                if (seenRows.has(rowString)) { duplicateCount++; return; }
                seenRows.add(rowString);

                let rawDate = row['日期'] ? row['日期'].toString().trim() : '';
                let cleanedDate = '-';
                if (rawDate) {
                    if (/^\d{8}$/.test(rawDate)) { cleanedDate = `${rawDate.substring(0,4)}-${rawDate.substring(4,6)}-${rawDate.substring(6,8)}`; }
                    else {
                        let parts = rawDate.split(/[\/\-]/);
                        if (parts.length === 3) { cleanedDate = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`; }
                        else { cleanedDate = rawDate; }
                    }
                }

                let cleanedCabin = row['艙段'] ? row['艙段'].toString().trim() : 'Unknown';
                let cleanedCrop = row['作物'] ? row['作物'].toString().trim() : 'Unknown';
                let rawDesc = row['病症描述'] ? row['病症描述'].toString().trim() : '-';

                let rawStatus = row['處理狀態'] ? row['處理狀態'].toString().trim().toUpperCase() : '';
                let statusCode = 'statusPending'; 
                if (['已完成', 'Y', '是', '已處理'].includes(rawStatus)) statusCode = 'statusDone';
                else pendingCount++;

                let diseaseKey = '健康/無異常';
                if (rawDesc.includes('白粉')) diseaseKey = '白粉病';
                else if (rawDesc.includes('黃斑')) diseaseKey = '黃斑病';
                else if (rawDesc.includes('褐化') || rawDesc.includes('根部')) diseaseKey = '根腐病';
                else if (rawDesc.includes('枯萎')) diseaseKey = '枯萎病';
                else if (rawDesc.includes('遲緩')) diseaseKey = '生長遲緩';

                finalCleanedData.push({
                    idx: finalCleanedData.length + 1, date: cleanedDate, cabin: cleanedCabin, crop: cleanedCrop,
                    desc: rawDesc, diseaseKey: diseaseKey, statusCode: statusCode
                });
            });

            cleanedDataGlobal = finalCleanedData;
            document.getElementById('statTotal').innerText = finalCleanedData.length;
            document.getElementById('statCleaned').innerText = duplicateCount;
            document.getElementById('statPending').innerText = pendingCount;

            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');

            populateFilterOptions(finalCleanedData);
            renderDashboardElements();
        }

        function populateFilterOptions(data) {
            const t = i18n[currentLang];
            const cabinFilter = document.getElementById('cabinFilter');
            const statusFilter = document.getElementById('statusFilter');
            
            // 記住當前選擇
            let currentCabinVal = cabinFilter.value;
            let currentStatusVal = statusFilter.value;

            cabinFilter.innerHTML = `<option value="ALL">${t.filterCabinAll}</option>`;
            let cabins = [...new Set(data.map(item => item.cabin))].sort();
            cabins.forEach(c => {
                let opt = document.createElement('option'); opt.value = c; opt.innerText = c;
                cabinFilter.appendChild(opt);
            });

            statusFilter.innerHTML = `
                <option value="ALL">${t.filterStatusAll}</option>
                <option value="statusPending">${t.statusPending}</option>
                <option value="statusDone">${t.statusDone}</option>
            `;

            // 恢復選擇 (如果仍然存在)
            if(currentCabinVal) cabinFilter.value = currentCabinVal;
            if(currentStatusVal) statusFilter.value = currentStatusVal;

            cabinFilter.onchange = renderDashboardElements;
            statusFilter.onchange = renderDashboardElements;
        }

        function renderDashboardElements() {
            const t = i18n[currentLang];
            const selectedStatus = document.getElementById('statusFilter').value;
            const selectedCabin = document.getElementById('cabinFilter').value;

            let filteredData = cleanedDataGlobal.filter(item => {
                let statusMatch = (selectedStatus === 'ALL' || item.statusCode === selectedStatus);
                let cabinMatch = (selectedCabin === 'ALL' || item.cabin === selectedCabin);
                return statusMatch && cabinMatch;
            });

            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            filteredData.forEach(item => {
                let tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                
                let localizedStatus = t[item.statusCode];
                let statusBadge = item.statusCode === 'statusDone' 
                    ? `<span class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full text-xs font-semibold border border-emerald-200">${localizedStatus}</span>`
                    : `<span class="bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full text-xs font-semibold border border-amber-200">${localizedStatus}</span>`;

                let localizedDisease = t.diseaseNames[item.diseaseKey];
                let diseaseBadge = item.diseaseKey === '健康/無異常' 
                    ? `<span class="text-slate-500 font-medium">${localizedDisease}</span>`
                    : `<span class="bg-purple-50 text-purple-700 px-2 py-0.5 rounded border border-purple-200 text-xs font-bold font-mono">✦ ${localizedDisease}</span>`;

                tr.innerHTML = `
                    <td class="px-6 py-3 text-xs text-slate-400 font-mono">${item.idx}</td>
                    <td class="px-6 py-3 font-medium whitespace-nowrap">${item.date}</td>
                    <td class="px-6 py-3 font-semibold text-slate-900">${item.cabin}</td>
                    <td class="px-6 py-3">${item.crop}</td>
                    <td class="px-6 py-3 text-slate-500 italic max-w-xs truncate" title="${item.desc}">${item.desc}</td>
                    <td class="px-6 py-3 whitespace-nowrap">${diseaseBadge}</td>
                    <td class="px-6 py-3 whitespace-nowrap">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });

            updateCharts(cleanedDataGlobal);
        }

        function updateCharts(data) {
            const t = i18n[currentLang];
            let cabins = [...new Set(data.map(item => item.cabin))].sort();
            let baseDiseases = ['白粉病', '黃斑病', '根腐病', '枯萎病', '生長遲緩', '健康/無異常'];
            let localizedDiseases = baseDiseases.map(d => t.diseaseNames[d]);

            let diseaseColors = { '白粉病': '#fc8181', '黃斑病': '#f6e05e', '根腐病': '#90cdf4', '枯萎病': '#f6ad55', '生長遲緩': '#bda4e4', '健康/無異常': '#cbd5e0' };

            let datasets = baseDiseases.map((diseaseKey, index) => {
                return {
                    label: localizedDiseases[index],
                    data: cabins.map(cabin => { return data.filter(item => item.cabin === cabin && item.diseaseKey === diseaseKey).length; }),
                    backgroundColor: diseaseColors[diseaseKey]
                };
            });

            if (chartsInstance.distribution) chartsInstance.distribution.destroy();
            const ctxBar = document.getElementById('distributionChart').getContext('2d');
            chartsInstance.distribution = new Chart(ctxBar, {
                type: 'bar',
                data: { labels: cabins, datasets: datasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } } }, plugins: { legend: { position: 'bottom' } } }
            });

            let pieData = baseDiseases.map(diseaseKey => data.filter(item => item.diseaseKey === diseaseKey).length);
            if (chartsInstance.pie) chartsInstance.pie.destroy();
            const ctxPie = document.getElementById('diseasePieChart').getContext('2d');
            chartsInstance.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: { labels: localizedDiseases, datasets: [{ data: pieData, backgroundColor: baseDiseases.map(d => diseaseColors[d]) }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '55%', plugins: { legend: { position: 'right' } } }
            });
        }
        
        // 頁面載入時初始化預設語系
        updateLanguage(currentLang);
    </script>
</body>
</html>
